<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
<style>
    body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 30px auto;
  padding: 20px;
  background-color: #f7f7f7;
  border-radius: 8px;
}
input, button {
  padding: 8px;
  margin: 8px 0;
  width: 100%;
  box-sizing: border-box;
}
button {
  background-color: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
}
table, th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

</style>
</head>
<body>
  <h1>Add Expense</h1>
  <form id="expenseForm">
    <input type="number" placeholder="Amount" id="amount" required />
    <input type="text" placeholder="Category" id="category" required />
    <!-- $$ -->
     <h2>Find by Category</h2>
<select id="searchCategory">
  <option value="">-- Select Category --</option>
  <option value="Food">Food</option>
  <option value="Transport">Transport</option>
  <option value="Groceries">Groceries</option>
  <option value="Entertainment">Entertainment</option>
</select>
<button onclick="searchByCategory()">Search</button>

<ul id="categoryResults"></ul>

    <!-- $$ -->
    <input type="text" placeholder="Comment" id="comment" />
    <input type="date" id="date" required />
    <button type="submit">Add Expense</button>
  </form>

  <!-- <h2>Find by Category</h2>
  <input type="text" id="searchCategory" placeholder="Enter category" />
  <button onclick="searchByCategory()">Search</button>
  <ul id="categoryResults"></ul> -->

  <h1>Category Summary</h1>
  <button onclick="loadSummary()">Load Summary</button>
  <table>
    <thead>
      <tr>
        <th>Category</th>
        <th>Total Amount</th>
      </tr>
    </thead>
    <tbody id="summaryTable"></tbody>
  </table>
  
  <script>
    const BASE_URL = 'http://localhost:3000'; // change if needed

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('expenseForm');
  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = document.getElementById('amount').value;
      const category = document.getElementById('category').value;
      const comment = document.getElementById('comment').value;
      const date = document.getElementById('date').value;

      const token = localStorage.getItem('token');
      const res = await fetch(BASE_URL + '/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ amount, category, comment, date })
      });

      const data = await res.json();
      alert(data.message || 'Expense added!');
      form.reset();
    });
  }
});

// Search expenses by category
async function searchByCategory() {
  const category = document.getElementById('searchCategory').value;
  const token = localStorage.getItem('token');

  const res = await fetch(BASE_URL + '/find', {
    method: 'GET',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    },
    // body: JSON.stringify({ category })
  });
if (!category) {
    alert("Please select a category first.");
    return;
  }
  const data = await res.json();
  const ul = document.getElementById('categoryResults');
  ul.innerHTML = '';

  data.amounts?.forEach((amt, idx) => {
    const li = document.createElement('li');
    li.textContent = `Expense ${idx + 1}: ₹${amt}`;
    ul.appendChild(li);
  });
}

// Load category summary
async function loadSummary() {
  const token = localStorage.getItem('token');
  const res = await fetch(BASE_URL + '/category-summary', {
    headers: {
      'Authorization': `Bearer ${token}`
    }
  });

  const data = await res.json();
  const tbody = document.getElementById('summaryTable');
  tbody.innerHTML = '';

  data.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${item.category}</td><td>₹${item.total}</td>`;
    tbody.appendChild(tr);
  });
}

  </script>
</body>
</html>
