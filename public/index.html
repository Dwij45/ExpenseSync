<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    canvas {
      max-width: 600px;
      margin: 40px auto;
      display: block;
    }
    /* $$ */
     body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 30px auto;
  padding: 20px;
  background-color: #f7f7f7;
  border-radius: 8px;
}
input, button {
  padding: 8px;
  margin: 8px 0;
  width: 100%;
  box-sizing: border-box;
}
button {
  background-color: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
}
table, th, td {
  border: 1px solid #ccc;
  padding: 8px;
}
    /* $$ */
  </style>
</head>
<body>
<script>
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = 'login.html';
  }
</script>

  <h2 style="text-align:center;">Expense Category Summary</h2>
  <button onclick="loadChart()">Click me to get graph</button>
  <button onclick="updateChart()">Find endpoint</button>
  <canvas id="expenseChart"></canvas>
  <!-- $$ -->
<table>
    <thead>
      <tr>
        <th>Category</th>
        <th>Total Amount</th>
      </tr>
    </thead>
    <tbody id="summaryTable"></tbody>
  </table>
<h2>Find by Category</h2>
  <!-- <input type="text" id="searchCategory" placeholder="Enter category" /> -->
   <select id="searchCategory">
   <option value="">-- Select Category --</option>
  <option value="Food">Food</option>
  <option value="Transportation">Transportation</option>
  <option value="Shopping">Shopping</option>
  <option value="Healthcare">Healthcare</option>
  <option value="Healthcare">Healthcare</option>
</select>
  <button onclick="updateChart()">log</button>
  <!-- <button onclick="searchByCategory()">Search</button> -->
  <ul id="categoryResults"></ul>
<!-- $$ -->
  <script>
    function logcategory(){
      const val = document.getElementById('searchCategory').value;
    console.log(val);
    }
    async function loadChart() {
      try {
        // Get token from localStorage
        const token = localStorage.getItem('token'); 
        
        const response = await fetch('http://localhost:3000/dashboard/category-summary', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'token': token // Using 'token' header as per your middleware
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        console.log(data)
        const categories = data.map(item => item.category);
        const totals = data.map(item => item.total);

        const ctx = document.getElementById('expenseChart').getContext('2d');
        // &
        const tbody = document.getElementById('summaryTable');
        tbody.innerHTML = '';

        data.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${item.category}</td><td>₹${item.total}</td>`;
          tbody.appendChild(tr);

          //&
        });
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: categories,
            datasets: [{
              label: 'Amount Spent (₹)',
              data: totals,
              backgroundColor: [
                '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'
              ]
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: {
                label: ctx => `₹ ${ctx.raw}`
              }}
            },
            scales: {
              y: {
                beginAtZero: true,
                title: { display: true, text: 'Amount (₹)' }
              },
              x: {
                title: { display: true, text: 'Category' }
              }
            }
          }
        });
      } catch (error) {
        console.error('Error loading chart:', error);
      }
    }

    // window.onload = loadChart;
    async function updateChart(){
      const token = localStorage.getItem('token');  

      const category = document.getElementById('searchCategory').value;
      console.log(category)
     const response = await fetch(`http://localhost:3000/dashboard/find?category=${encodeURIComponent(category)}`, {
    method: 'GET',
    headers: {
      'Content-Type': 'application/json',
      'token': token
    }
  });

        const data = await response.json();
        if (!data.amounts || data.amounts.length === 0) {
        const ul = document.getElementById('categoryResults');
        ul.innerHTML = '';
        const li = document.createElement('li');
        li.textContent = `No expense found in this category.`;
        ul.appendChild(li);
      }
        else{
          console.log(data)
          // %%
          const ul = document.getElementById('categoryResults');
          ul.innerHTML = '';
          data.amounts?.forEach((amt, idx) => {
          const li = document.createElement('li');
          li.textContent = `Expense ${idx + 1}: ₹${amt}`;
          ul.appendChild(li);
        });

        }
    }
  </script>
</body>
</html>
