  <script>

  function renderExpenseTable(expenses) {
  const tbody = document.getElementById('expenseTableBody');
  tbody.innerHTML = ''; // Clear old rows

  if (expenses.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No expenses found</td></tr>`;
    return;
  }

  expenses.forEach(exp => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${new Date(exp.date).toLocaleDateString()}</td>
      <td>₹${exp.amount.toFixed(2)}</td>
      <td>${exp.category}</td>
      <td>${exp.comment || '-'}</td>
      <td>
        <button class="edit-btn" data-id="${exp._id}">Edit</button>
        <button class="delete-btn" data-id="${exp._id}">Delete</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

async function getall(){

       'Content-Type': 'application/json',

      if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);

    renderExpenseTable(expanses);

async function getselected(){

  const filterBtn = document.getElementById('filterBtn');
  const startDateInput = document.getElementById('startDate');
  const endDateInput = document.getElementById('endDate');
  endDateInput.valueAsDate = new Date(); // Set to today by default

  filterBtn.addEventListener('click', async () => {
    const start = startDateInput.value;
    const end = endDateInput.value;
    console.log("start", start);
    console.log("end", end);
    const token = localStorage.getItem('token'); // Adjust as per your auth logic

    if (!start || !end) {
      alert("Please select both start and end dates.");
      return;
    }

    try {
      const response = await fetch(`http://localhost:3000/dashboard/get?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`, {
        headers: {
          'Content-Type': 'application/json',
          'token': token // Using 'token' header as per your middleware
        }
      });

      const filteredExpenses = await response.json();
      console.log(filteredExpenses); // Or render in UI

      renderExpenseTable(filteredExpenses);

    } catch (error) {
      console.error("Error fetching filtered expenses:", error);
    }
  });


    async function loadChart() {
      try {
        // Get token from localStorage
        // const token = localStorage.getItem('token'); 
        const token = localStorage.getItem('token'); 
        
        // const response = await fetch('http://localhost:3000/dashboard/category-summary', {
        //   method: 'GET',
        //   headers: {
        //     'Content-Type': 'application/json',
        //     'token': token // Using 'token' header as per your middleware
        //   }
        // });

        const response=await axios.get('http://localhost:3000/dashboard/category-summary',{
          headers:{
            'Content-Type': 'application/json',
            'token': token // Using 'token' header as per your middleware
          }
        }).then((response) => {
          if (!response.ok) {
            console.log("Error in response"+response.Error);
          }
          return response.data;
        });

 
        // const data = await response.json();
        const data = response;
        console.log(data)
        console.log(data.categories)
        const categories = data.map(item => item.category);
        const totals = data.map(item => item.total);

        const ctx = document.getElementById('expenseChart').getContext('2d');
        // &
        const tbody = document.getElementById('summaryTable');
        tbody.innerHTML = '';

        data.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${item.category}</td><td>₹${item.total}</td>`;
          tbody.appendChild(tr);

          //&
        });
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: categories,
            datasets: [{
              label: 'Amount Spent (₹)',
              data: totals,
              backgroundColor: [
                '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'
              ]
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: {
                label: ctx => `₹ ${ctx.raw}`
              }}
            },
            scales: {
              y: {
                beginAtZero: true,
                title: { display: true, text: 'Amount (₹)' }
              },
              x: {
                title: { display: true, text: 'Category' }
              }
            }
          }
        });
      } catch (error) {
        console.error('Error loading chart:', error);
      }
    }

    // window.onload = loadChart;
    async function updateChart(){
      const token = localStorage.getItem('token');  

      const category = document.getElementById('searchCategory').value;
      console.log(category)
     const response = await fetch(`http://localhost:3000/dashboard/find?category=${encodeURIComponent(category)}`, {
    method: 'GET',
    headers: {
      'Content-Type': 'application/json',
      'token': token
    }
  });

        const data = await response.json();
        if (!data.amounts || data.amounts.length === 0) {
        const ul = document.getElementById('categoryResults');
        ul.innerHTML = '';
        const li = document.createElement('li');
        li.textContent = `No expense found in this category.`;
        ul.appendChild(li);
      }
        else{
          console.log(data)
          // %%
          const ul = document.getElementById('categoryResults');
          ul.innerHTML = '';
          data.amounts?.forEach((amt, idx) => {
          const li = document.createElement('li');
          li.textContent = `Expense ${idx + 1}: ₹${amt}`;
          ul.appendChild(li);
        });

        }
    }

  async function generatePdf(){
      const token = localStorage.getItem('token');
      const response = await fetch('http://localhost:3000/download/pdf', {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json',
          'token': token // Using 'token' header as per your middleware)
    }
  })
  const blob = await response.blob();
  const url=window.URL.createObjectURL(blob);
  const a= document.createElement('a');
  a.href=url;
  a.download='expenses.pdf';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
