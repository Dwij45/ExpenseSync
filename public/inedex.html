<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    canvas {
      max-width: 600px;
      margin: 40px auto;
      display: block;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Expense Category Summary</h2>
  <canvas id="expenseChart"></canvas>

  <script>
    async function loadChart() {
    //   const response = await fetch('http://localhost:3000/dashboard/category-summary'); // adjust path if needed
    
//! IMP : retreving from local storeage
    const token = localStorage.getItem('token'); 
    fetch('http://localhost:3000/dashboard/category-summary', {
  headers: {
    Authorization: `Bearer ${token}`
  }
})

      const data = await response.json();

      const categories = data.map(item => item.category);
      const totals = data.map(item => item.total);

      const ctx = document.getElementById('expenseChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: categories,
          datasets: [{
            label: 'Amount Spent (₹)',
            data: totals,
            backgroundColor: [
              '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'
            ]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              label: ctx => `₹ ${ctx.raw}`
            }}
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: 'Amount (₹)' }
            },
            x: {
              title: { display: true, text: 'Category' }
            }
          }
        }
      });
    }

    window.onload = loadChart;
  </script>
</body>
</html>
